background {
    monitor =
    # path = ~/Media/Pictures/Wallpapers/current.jpg
	path = ~/Media/Pictures/Wallpapers/16x9/mountains.jpg
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(cdd6f4)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = rgb(255, 255, 255)
    font_size = 64
    font_family = Maple Mono NF NL
    position = 0, 160
    halign = center
    valign = center
}
